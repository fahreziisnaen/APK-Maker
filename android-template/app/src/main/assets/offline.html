<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f4f6fc;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .box {
      background: #fff;
      width: 100%;
      max-width: 360px;
      padding: 32px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .icon { width: 80px; margin-bottom: 20px; }
    .title { font-size: 24px; font-weight: bold; color: #2b2b2b; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #777; margin-bottom: 20px; }
    .msg { font-size: 15px; color: #444; margin-bottom: 24px; line-height: 1.5; }
    .btn {
      display: inline-block;
      background: {{THEME_COLOR}};
      color: #fff;
      padding: 12px 28px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
    .btn:active { opacity: 0.85; }
    .footer { font-size: 12px; color: #888; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="box">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
         stroke="{{THEME_COLOR}}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <h1 class="title">Tidak Ada Koneksi</h1>
    <p class="subtitle">{{APP_NAME}}</p>
    <p class="msg">Pastikan koneksi internet kamu aktif,<br>lalu coba muat ulang halaman.</p>
    <button class="btn" onclick="location.reload()">Coba Lagi</button>
    <div class="footer">&copy; <span id="y"></span> {{APP_NAME}}</div>
  </div>
  <script>document.getElementById('y').textContent = new Date().getFullYear();</script>
</body>
</html>
