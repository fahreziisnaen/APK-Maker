services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    ports:
      - '4001:4001'
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=file:/app/data/apkmaker.db
    volumes:
      - apk_storage:/app/storage
      - backend_data:/app/data
    depends_on:
      - redis

  worker:
    build: ./worker
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=file:/app/data/apkmaker.db
      - ANDROID_SDK_ROOT=/opt/android-sdk
      - TEMPLATE_DIR=/app/android-template
    volumes:
      - ./android-template:/app/android-template:ro
      - apk_storage:/app/storage
      - android_sdk:/opt/android-sdk
      - gradle_cache:/root/.gradle
    depends_on:
      - redis
      - backend

  frontend:
    build: ./frontend
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
      - NEXT_PUBLIC_API_URL=http://localhost:4001
      - INTERNAL_API_URL=http://backend:4001
    depends_on:
      - backend

volumes:
  redis_data:
  apk_storage:
  backend_data:
  android_sdk:
  gradle_cache:
