<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f4f6fc;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .box {
      background: #fff;
      width: 100%;
      max-width: 360px;
      padding: 32px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .title {
      font-size: 26px;
      font-weight: bold;
      color: #2b2b2b;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #777;
      margin-bottom: 24px;
    }

    .icon {
      width: 90px;
      margin-bottom: 20px;
      opacity: .9;
    }

    .msg {
      font-size: 15px;
      color: #444;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      background: #2b7cff;
      color: #fff;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
    }

    .btn:hover { background: #1f64d0; }

    .footer {
      font-size: 12px;
      color: #888;
      margin-top: 25px;
    }

    .dev {
      margin-top: 18px;
      font-size: 12px;
      color: #666;
    }

    .dev img {
      width: 120px;
      margin-top: 6px;
      opacity: 0.9;
    }

  </style>
</head>
<body>

  <div class="box">

    <img class="icon" src="data:image/svg+xml;utf8,
      <svg xmlns='http://www.w3.org/2000/svg' width='90' height='90' viewBox='0 0 24 24' fill='none' stroke='%232b7cff' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'>
        <path d='M3 16v-2a6 6 0 0112 0v2'/>
        <path d='M21 16v-2a9 9 0 00-18 0v2'/>
        <path d='M8 21h8'/>
      </svg>" />

    <h1 class="title">Offline</h1>
    <p class="subtitle">Tidak dapat terhubung ke server</p>

    <p class="msg">
